<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Attendance Management System | Login</title>
<meta name="description" content="Sign in to the Attendance Management System" />

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="style.css" />
</head>
<body class="login-page">

  <!-- Full-screen loader shown while Firebase checks for an existing session -->
  <div class="page-loader" id="page-loader">
    <div class="loader-ring"></div>
    <div class="loader-text">Checking session…</div>
  </div>

  <main class="login-card hidden" id="login-card">
    <div class="brand">
      <div class="brand-mark">AM</div>
      <div>
        <div class="brand-title">AttendifyHR</div>
        <div class="brand-sub">Attendance Management System</div>
      </div>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to continue to your dashboard.</p>

    <!-- Role selector — purely a UX hint; the real role is always verified
         against Firestore after authentication, never trusted from the UI. -->
    <div class="role-toggle" role="tablist" aria-label="Choose account type">
      <button type="button" class="active" data-role="employee" id="role-employee-btn">Employee</button>
      <button type="button" data-role="admin" id="role-admin-btn">Admin</button>
    </div>

    <form id="login-form" novalidate>
      <div class="field">
        <label for="email">Work email</label>
        <input type="email" id="email" name="email" placeholder="you@company.com" autocomplete="username" required />
        <div class="field-error" id="email-error">Enter a valid email address.</div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
        <div class="field-error" id="password-error">Password is required.</div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="login-btn">
        <span id="login-btn-text">Sign in</span>
      </button>
    </form>

    <p class="cell-muted" style="text-align:center; margin-top:18px; font-size:12.5px;">
      Don't have an account? Contact your admin to get added.
    </p>
  </main>

  <div id="toast-container"></div>

  <!-- Firebase SDKs (compat build — no bundler required, GitHub Pages friendly) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="firebase-config.js"></script>
  <script src="login.js"></script>
</body>
</html>
